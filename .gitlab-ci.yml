variables:
  AWS_DEFAULT_REGION: us-east-1
  ROLE_ARN: arn:aws:iam::448049810701:role/avertra-sockshop-gitlab-ci
  ECR: 448049810701.dkr.ecr.us-east-1.amazonaws.com
  TF_DIR: terraform/envs/dev

stages:
  - validate
  - plan
  - apply
  - mirror
  - deploy
  - destroy

.aws-auth:
  id_tokens:
    AWS_ID_TOKEN:
      aud: https://gitlab.com
  before_script:
    - echo "$AWS_ID_TOKEN" > "$CI_PROJECT_DIR/.web-identity-token"
    - export AWS_WEB_IDENTITY_TOKEN_FILE="$CI_PROJECT_DIR/.web-identity-token"
    - export AWS_ROLE_ARN="$ROLE_ARN"
    - export AWS_ROLE_SESSION_NAME="gitlab-$CI_JOB_ID"

.infra-rules:
  rules:
    - changes:
        - terraform/**/*
        - bootstrap/**/*
        - .gitlab-ci.yml

tf-fmt:
  stage: validate
  extends: .infra-rules
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - terraform fmt -check -recursive terraform bootstrap

tf-validate:
  stage: validate
  extends: .infra-rules
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - cd "$TF_DIR"
    - terraform init -backend=false -input=false
    - terraform validate

tfsec:
  stage: validate
  extends: .infra-rules
  image:
    name: aquasec/tfsec:latest
    entrypoint: [""]
  script:
    - tfsec ./bootstrap
    - tfsec ./terraform/envs/dev

drift-check:
  stage: validate
  extends: .aws-auth
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - cd "$TF_DIR"
    - terraform init -input=false
    - terraform plan -detailed-exitcode -input=false -no-color || { ec=$?; if [ "$ec" = "2" ]; then echo "DRIFT DETECTED - reality no longer matches the state; review the plan above"; fi; exit $ec; }
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true

tf-plan:
  stage: plan
  extends: [.aws-auth, .infra-rules]
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - cd "$TF_DIR"
    - terraform init -input=false
    - terraform plan -input=false -out=plan.tfplan
    - terraform show -no-color plan.tfplan > plan.txt
  artifacts:
    paths:
      - $TF_DIR/plan.tfplan
      - $TF_DIR/plan.txt
    expire_in: 1 week

tf-apply:
  stage: apply
  extends: .aws-auth
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - cd "$TF_DIR"
    - terraform init -input=false
    - terraform apply -input=false plan.tfplan
  needs: [tf-plan]
  when: manual
  resource_group: dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - terraform/**/*
        - bootstrap/**/*
        - .gitlab-ci.yml

.service-matrix:
  parallel:
    matrix:
      - SERVICE: front-end
        UPSTREAM: weaveworksdemos/front-end:0.3.12
      - SERVICE: catalogue
        UPSTREAM: weaveworksdemos/catalogue:0.3.5
      - SERVICE: carts
        UPSTREAM: weaveworksdemos/carts:0.4.8
      - SERVICE: orders
        UPSTREAM: weaveworksdemos/orders:0.4.7
      - SERVICE: shipping
        UPSTREAM: weaveworksdemos/shipping:0.4.8
      - SERVICE: queue-master
        UPSTREAM: weaveworksdemos/queue-master:0.3.1
      - SERVICE: payment
        UPSTREAM: weaveworksdemos/payment:0.4.3
      - SERVICE: user
        UPSTREAM: weaveworksdemos/user:0.4.4
      - SERVICE: user-db
        UPSTREAM: weaveworksdemos/user-db:0.4.0
      - SERVICE: carts-db
        UPSTREAM: mongo:3.4
      - SERVICE: orders-db
        UPSTREAM: mongo:3.4
      - SERVICE: session-db
        UPSTREAM: redis:alpine
      - SERVICE: rabbitmq
        UPSTREAM: rabbitmq:3.6.8

mirror:
  stage: mirror
  extends: [.aws-auth, .service-matrix]
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - docker pull "$UPSTREAM"
    - trivy image --severity HIGH,CRITICAL --exit-code 0 "$UPSTREAM"
    - apk add --no-cache docker-credential-ecr-login
    - mkdir -p ~/.docker
    - echo "{\"credHelpers\":{\"$ECR\":\"ecr-login\"}}" > ~/.docker/config.json
    - docker tag "$UPSTREAM" "$ECR/sockshop/$SERVICE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$UPSTREAM" "$ECR/sockshop/$SERVICE:stable"
    - docker push "$ECR/sockshop/$SERVICE:$CI_COMMIT_SHORT_SHA"
    - docker push "$ECR/sockshop/$SERVICE:stable"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  extends: [.aws-auth, .service-matrix]
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - aws ecs update-service --cluster sockshop --service "$SERVICE" --force-new-deployment
    - aws ecs wait services-stable --cluster sockshop --services "$SERVICE"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

seed:
  stage: deploy
  extends: .aws-auth
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - SUBNETS=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=sockshop-private-a,sockshop-private-b" --query "Subnets[].SubnetId" --output text | tr '\t' ',')
    - SG=$(aws ec2 describe-security-groups --filters Name=group-name,Values=sockshop-backend-sg --query "SecurityGroups[0].GroupId" --output text)
    - TASK=$(aws ecs run-task --cluster sockshop --launch-type FARGATE --task-definition sockshop-seed --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" --query "tasks[0].taskArn" --output text)
    - echo "seed task $TASK"
    - aws ecs wait tasks-stopped --cluster sockshop --tasks "$TASK"
    - TID=${TASK##*/}
    - aws logs get-log-events --log-group-name /ecs/sockshop/seed --log-stream-name "seed/seed/$TID" --query "events[].message" --output text | tee seed.log
    - grep -q "SEED COMPLETE" seed.log
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

load-demo:
  stage: deploy
  extends: .aws-auth
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  variables:
    CLIENTS: "10"
    REQUESTS: "10000"
  script:
    - ALB=$(aws elbv2 describe-load-balancers --names sockshop-alb --query "LoadBalancers[0].DNSName" --output text)
    - SUBNETS=$(aws ec2 describe-subnets --filters "Name=tag:Name,Values=sockshop-private-a,sockshop-private-b" --query "Subnets[].SubnetId" --output text | tr '\t' ',')
    - SG=$(aws ec2 describe-security-groups --filters Name=group-name,Values=sockshop-backend-sg --query "SecurityGroups[0].GroupId" --output text)
    - TASK=$(aws ecs run-task --cluster sockshop --launch-type FARGATE --task-definition sockshop-loadtest --overrides "{\"containerOverrides\":[{\"name\":\"user-sim\",\"command\":[\"-r\",\"$REQUESTS\",\"-c\",\"$CLIENTS\",\"-h\",\"$ALB\"]}]}" --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" --query "tasks[0].taskArn" --output text)
    - echo "user-sim fired at $ALB with $CLIENTS clients / $REQUESTS total requests -> $TASK"
    - echo "now watch ECS front-end desired count and the sockshop-overview dashboard"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

load-stop:
  stage: deploy
  extends: .aws-auth
  image:
    name: amazon/aws-cli:2.22.0
    entrypoint: [""]
  script:
    - TASKS=$(aws ecs list-tasks --cluster sockshop --family sockshop-loadtest --desired-status RUNNING --query "taskArns" --output text)
    - if [ -z "$TASKS" ] || [ "$TASKS" = "None" ]; then echo "no user-sim running - nothing to stop"; exit 0; fi
    - for T in $TASKS; do aws ecs stop-task --cluster sockshop --task "$T" --reason "load-demo stopped from pipeline" --query "task.taskArn" --output text; done
    - echo "load stopped - the autoscaler will walk capacity back down after its quiet window"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

scan-gate-demo:
  stage: mirror
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity CRITICAL --exit-code 1 weaveworksdemos/carts:0.4.8
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

tf-destroy:
  stage: destroy
  extends: .aws-auth
  image:
    name: hashicorp/terraform:1.15
    entrypoint: [""]
  script:
    - if [ "$CONFIRM_DESTROY" != "sockshop-dev" ]; then echo "REFUSING. Re-run this job with variable CONFIRM_DESTROY=sockshop-dev (Run pipeline / job variables)."; exit 1; fi
    - cd "$TF_DIR"
    - terraform init -input=false
    - terraform destroy -auto-approve -input=false
  when: manual
  resource_group: dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
